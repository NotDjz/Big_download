<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIG DL</title>
    <link rel="icon" type="image/png" href="/static/icon.png">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="logo">BIG DL</div>
            <div class="tagline">Colle ton lien, c'est tout.</div>
        </header>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" data-tab="download">Telecharger</button>
            <button class="tab" data-tab="cut">Decouper</button>
        </div>

        <!-- ==================== TAB: DOWNLOAD ==================== -->
        <div id="tab-download" class="tab-content">
            <!-- Search -->
            <div class="search-zone">
                <div class="search-bar">
                    <input type="text" id="url-input" class="search-input"
                           placeholder="Colle un lien YouTube, Instagram, TikTok, X..."
                           autocomplete="off" spellcheck="false">
                    <div id="platform-badge" class="platform-badge hidden"></div>
                    <button id="go-btn" class="go-btn">GO</button>
                </div>
                <div class="supported-platforms">
                    <span>YouTube</span>
                    <span>Instagram</span>
                    <span>TikTok</span>
                    <span>X</span>
                    <span>SoundCloud</span>
                </div>
            </div>

            <!-- Result (inline, hidden by default) -->
            <div id="result-zone" class="result-zone hidden">
                <div class="result-card">
                    <div class="result-thumb" id="result-thumb">
                        <span class="thumb-play">&#9654;</span>
                    </div>
                    <div class="result-info">
                        <div class="result-title" id="result-title"></div>
                        <div class="result-meta" id="result-meta"></div>
                        <div class="result-formats" id="result-formats"></div>
                    </div>
                </div>
            </div>

            <!-- Progress -->
            <div id="progress-zone" class="progress-zone hidden">
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <div class="progress-info">
                    <span id="progress-status">Telechargement...</span>
                    <span id="progress-percent">0%</span>
                    <span id="progress-speed"></span>
                    <span id="progress-eta"></span>
                </div>
            </div>

            <!-- Status message -->
            <div id="status-msg" class="status-msg hidden"></div>
        </div>

        <!-- ==================== TAB: CUT ==================== -->
        <div id="tab-cut" class="tab-content hidden">
            <!-- Upload zone -->
            <div id="cut-upload-zone" class="cut-upload-zone">
                <div class="cut-dropzone" id="cut-dropzone">
                    <div class="cut-dropzone-icon">&#9986;</div>
                    <div class="cut-dropzone-text">Glisse un fichier ici</div>
                    <div class="cut-dropzone-sub">ou clique pour choisir (MP4, MP3, MKV, WAV...)</div>
                    <input type="file" id="cut-file-input" accept="video/*,audio/*,.mp3,.mp4,.mkv,.webm,.m4a,.wav,.flac,.ogg,.avi,.mov" hidden>
                </div>
            </div>

            <!-- Cut editor (hidden until file loaded) -->
            <div id="cut-editor" class="cut-editor hidden">
                <div class="cut-preview">
                    <div id="cut-preview-container" class="cut-preview-container"></div>
                    <div class="cut-preview-controls">
                        <button id="cut-play-btn" class="player-btn">&#9654;</button>
                        <span id="cut-current-time" class="cut-time-display">0:00</span>
                    </div>
                </div>

                <!-- Range slider -->
                <div class="cut-range-zone">
                    <div class="cut-range-track" id="cut-range-track">
                        <div class="cut-range-selected" id="cut-range-selected"></div>
                        <div class="cut-range-handle cut-handle-start" id="cut-handle-start"></div>
                        <div class="cut-range-handle cut-handle-end" id="cut-handle-end"></div>
                        <div class="cut-range-playhead" id="cut-playhead"></div>
                    </div>
                    <div class="cut-range-labels">
                        <span id="cut-label-start">0:00</span>
                        <span id="cut-label-duration"></span>
                        <span id="cut-label-end">0:00</span>
                    </div>
                </div>

                <!-- Cut info + actions -->
                <div class="cut-actions">
                    <div class="cut-file-info">
                        <span id="cut-filename"></span>
                        <span id="cut-filesize"></span>
                    </div>
                    <div class="cut-btns">
                        <button id="cut-reset-btn" class="cut-reset-btn">Changer de fichier</button>
                        <button id="cut-do-btn" class="trim-cut-btn">Couper</button>
                    </div>
                </div>
                <div id="cut-status" class="trim-status hidden"></div>
                <div id="cut-progress-bar" class="cut-progress-bar hidden"><div class="cut-progress-fill"></div></div>
            </div>
        </div>

        <!-- Downloads list -->
        <div class="downloads-zone">
            <div class="downloads-header">
                <span class="downloads-label">Recents</span>
                <span class="downloads-count" id="downloads-count"></span>
                <button id="open-folder-btn" class="open-folder-btn" title="Ouvrir le dossier">📂</button>
            </div>
            <div id="downloads-list" class="downloads-list"></div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <span id="footer-stats"></span>
            <span>BIG DL</span>
        </footer>
    </div>

    <!-- Video/Audio Player Modal -->
    <div id="player-modal" class="modal hidden">
        <div class="modal-backdrop" onclick="closePlayer()"></div>
        <div class="modal-content">
            <button class="modal-close" onclick="closePlayer()">&#10005;</button>
            <div id="player-container" class="player-container"></div>
            <div class="player-controls" id="player-controls">
                <button id="player-play-btn" class="player-btn" onclick="togglePlay()">&#9654;</button>
                <div class="player-seek-wrap">
                    <div class="player-seek-bar" id="player-seek-bar">
                        <div class="player-seek-fill" id="player-seek-fill"></div>
                    </div>
                </div>
                <span class="player-time" id="player-time">0:00 / 0:00</span>
                <div class="player-volume-wrap">
                    <button class="player-btn player-vol-icon" id="player-vol-icon" onclick="toggleMute()">&#128266;</button>
                    <input type="range" id="player-volume" class="player-volume" min="0" max="1" step="0.05" value="0.1">
                </div>
            </div>
            <div class="modal-info">
                <div class="modal-title" id="modal-title"></div>
                <div class="modal-meta" id="modal-meta"></div>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
